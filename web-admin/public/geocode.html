var done=0,results=[],pMap=null;

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function initMap(){
  return new Promise(resolve=>{
    var t=0;
    function check(){
      if(typeof TGOS!=="undefined"&&TGOS.OnlineMap){
        try{
          pMap=new TGOS.OnlineMap(document.getElementById("TGMap"),TGOS.CoordSys.EPSG3826,null,()=>{
            document.getElementById("status").innerText="SDK OK"; resolve(true);
          });
        }catch(e){document.getElementById("status").innerText="Map err:"+e.message;resolve(false)}
      }else if(t++>80){document.getElementById("status").innerText="SDK load failed";resolve(false)}
      else setTimeout(check,100);
    }
    check();
  });
}

function geo(addr){
  return new Promise(resolve=>{
    try{
      new TGOS.LocateService(pMap).locateWGS84({address:addr},function(e){
        if(e&&e.length>0&&e[0].geometry) resolve({ok:true,lat:e[0].geometry.location.y,lng:e[0].geometry.location.x});
        else resolve({ok:false});
      });
    }catch(ex){resolve({ok:false,err:ex.message})}
  });
}

async function start(){
  document.getElementById("btn").disabled=true;
  if(!pMap){var ok=await initMap();if(!ok){document.getElementById("btn").disabled=false;return}}
  for(var i=0;i<CS.length;i++){
    var c=CS[i],r=await geo(c.a);done++;
    results.push({id:c.id,name:c.n,lat:r.lat||null,lng:r.lng||null,ok:r.ok});
    document.getElementById("bar").value=done;
    document.getElementById("status").innerText="["+done+"/"+CS.length+"] "+(r.ok?"OK":"FAIL")+" "+c.n;
    await sleep(500);
  }
  // Auto-save to DB via local API
  var okList=results.filter(r=>r.ok);
  document.getElementById("status").innerText="定位完成: "+okList.length+"/"+CS.length+" | 寫入資料庫中...";
  var TOKEN=localStorage.getItem("access_token")||"";
  var saved=0;
  for(var j=0;j<okList.length;j++){
    var r=okList[j];
    try{
      await fetch("http://localhost:3000/api/v1/customers/"+r.id,{
        method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},
        body:JSON.stringify({latitude:r.lat,longitude:r.lng})
      });
      saved++;
    }catch(e){}
    if(j%20===0) document.getElementById("status").innerText="寫入 "+saved+"/"+okList.length;
    await sleep(100);
  }
  document.getElementById("status").innerText="DONE! 寫入 "+saved+"/"+okList.length+" 筆";
  document.getElementById("btn").disabled=false;
}
</script></body></html>
