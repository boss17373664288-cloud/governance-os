[build]
  builder = "nixpacks"
  buildCommand = "npm ci && npm run build"

[deploy]
  startCommand = "node server.js"
  healthcheckPath = "/login"
  restartPolicyType = "ON_FAILURE"

[variables]
  NODE_ENV = "production"
  PORT = "3000"
  BACKEND_URL = "https://backend-production-abe09.up.railway.app"
