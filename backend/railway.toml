[build]
  builder = "nixpacks"
  buildCommand = "npm install && npm run build"

[deploy]
  startCommand = "npm run start:prod"
  healthcheckPath = "/api/v1/health"
  restartPolicyType = "ON_FAILURE"

[trainyard]
  [trainyard.environments]
    [trainyard.environments.production]
      [trainyard.environments.production.variables]
        NODE_ENV = "production"
        PORT = "3000"
